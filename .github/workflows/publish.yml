name: Publish

on:
  release:
    types: [ published ]

permissions:
  contents: write
  packages: write

jobs:
  publish:
    name: Publish to GitHub Packages and attach JARs to release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Derive release version from tag
        id: version
        run: |
          # Strip leading 'v' from tag name (e.g. v0.1.0 -> 0.1.0)
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build and publish JARs
        run: ./gradlew :core:publish --no-daemon -PreleaseVersion=${{ steps.version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload JARs to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            core/build/libs/*.jar \
            --clobber
